<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sister</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
}

.container{
    margin-top:120px;
}

h1{
    font-size:45px;
}

p{
    font-size:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    background:#ff4b5c;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff1e40;
}

.hidden{
    display:none;
}

.message{
    margin-top:30px;
    font-size:22px;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Akka 🎂</h1>

<p>You are the best sister in the world ❤️</p>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<div id="msg" class="message hidden">
💖 Dear Sister,<br><br>
Thank you for always supporting me.<br>
May your life be filled with happiness and success.<br><br>
✨ Happy Birthday! ✨
</div>

</div>

<script>
function showMessage(){
    document.getElementById("msg").classList.remove("hidden");
}
</script>

</body>
</html>
